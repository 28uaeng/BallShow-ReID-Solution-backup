# 增强版配置文件：包含所有数据增强
# 使用方法：
# python train.py --config_file configs/BallShow/vit_transreid_stride_aug.yml MODEL.DEVICE_ID "('0')"

MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: 'weights/jx_vit_base_p16_224-80ecf9dd.pth'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [12, 12]
  SIE_CAMERA: True
  SIE_COE: 3.0
  JPM: True
  RE_ARRANGE: True

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  # 启用数据增强
  USE_OCCLUSION: True      # 遮挡增强（针对包夹场景）
  USE_MOTION_BLUR: True    # 运动模糊增强（针对快速移动）
  USE_LIGHTING: True       # 光照增强（针对不同场地灯光）

DATASETS:
  NAMES: ('ballshow')
  ROOT_DIR: ('../BallShow-ReID')

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 150          # 增加训练轮数
  BASE_LR: 0.008
  IMS_PER_BATCH: 64
  WARMUP_METHOD: 'linear'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 150
  LOG_PERIOD: 50
  EVAL_PERIOD: 150
  WEIGHT_DECAY:  1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2

TEST:
  EVAL: True
  IMS_PER_BATCH: 256
  RE_RANKING: False
  USE_TTA: True            # 测试时增强
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

OUTPUT_DIR: 'logs/BallShow_vit_transreid_stride_aug'
